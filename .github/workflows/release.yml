name: Build and publish release

on:
  push:
    tags:
      - '*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl,aarch64-unknown-linux-musl

      - uses: Swatinem/rust-cache@v2
        with:
          cache-targets: "true"

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install cargo-deb and cross
        run: cargo install cargo-deb cross

      - name: Build x86_64 .deb
        run: |
          cargo build --release --target x86_64-unknown-linux-musl
          cargo deb --target x86_64-unknown-linux-musl --no-build --no-strip

      - name: Build aarch64 .deb
        run: |
          cross build --release --target aarch64-unknown-linux-musl
          cargo deb --target aarch64-unknown-linux-musl --no-build --no-strip

      - name: Stage .deb files
        run: |
          mkdir -p staging
          cp target/x86_64-unknown-linux-musl/debian/*.deb staging/
          cp target/aarch64-unknown-linux-musl/debian/*.deb staging/

      - uses: actions/upload-artifact@v4
        with:
          name: deb-packages
          path: staging/*.deb

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: target/release/sbk.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin

      - name: Build aarch64
        run: cargo build --release --target aarch64-apple-darwin

      - name: Create universal binary
        run: |
          lipo -create \
            target/x86_64-apple-darwin/release/sbk \
            target/aarch64-apple-darwin/release/sbk \
            -output sbk
          tar -czf sbk-macos-universal.tar.gz sbk

      - uses: actions/upload-artifact@v4
        with:
          name: macos-binary
          path: sbk-macos-universal.tar.gz

  publish-crates:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }} || echo "Already published, skipping."

  publish:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename Windows binary
        run: cp artifacts/windows-binary/sbk.exe sbk-${{ github.ref_name }}-windows-x86_64.exe

      - name: Rename macOS archive
        run: cp artifacts/macos-binary/sbk-macos-universal.tar.gz sbk-${{ github.ref_name }}-macos-universal.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/deb-packages/*.deb
            sbk-${{ github.ref_name }}-windows-x86_64.exe
            sbk-${{ github.ref_name }}-macos-universal.tar.gz

      - name: Checkout apt-repo
        uses: actions/checkout@v4
        with:
          repository: ChaoticTrials/apt-repo
          token: ${{ secrets.APT_REPO_TOKEN }}
          path: apt-repo

      - name: Install aptly
        run: |
          sudo apt-get update
          sudo apt-get install -y aptly gnupg

      - name: Import GPG key
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Build apt repo with aptly
        run: |
          mkdir -p apt-repo/public
          cat > ~/.aptly.conf <<EOF
          {
            "rootDir": "$GITHUB_WORKSPACE/apt-repo/.aptly",
            "FileSystemPublishEndpoints": {
              "apt-repo": {
                "rootDir": "$GITHUB_WORKSPACE/apt-repo/public",
                "linkMethod": "copy"
              }
            }
          }
          EOF
          aptly repo create -distribution=stable -component=main packages 2>/dev/null || true
          aptly repo add packages artifacts/deb-packages/*.deb
          aptly publish repo \
            -gpg-key=${{ secrets.GPG_KEY_ID }} \
            -passphrase="${{ secrets.GPG_PASSPHRASE }}" \
            -architectures=amd64,arm64 \
            -distribution=stable \
            packages \
            filesystem:apt-repo: 2>/dev/null || \
          aptly publish update \
            -gpg-key=${{ secrets.GPG_KEY_ID }} \
            -passphrase="${{ secrets.GPG_PASSPHRASE }}" \
            stable \
            filesystem:apt-repo:

      - name: Commit and push updated apt-repo
        working-directory: apt-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Release sbk ${{ github.ref_name }}"
          git push
